<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus POS | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="loading-overlay" class="hidden fixed inset-0 z-[100] flex items-center justify-center pointer-events-none">
        <div class="absolute inset-0 bg-slate-900/10 backdrop-blur-[2px]"></div>

        <div
            class="relative bg-white p-8 rounded-[2.5rem] shadow-2xl flex flex-col items-center justify-center border border-slate-100 animate-in fade-in zoom-in duration-200 pointer-events-auto">
            <div class="relative flex items-center justify-center">
                <div class="w-8 h-8 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
            </div>
            <p class="mt-4 font-black text-slate-700 uppercase tracking-widest text-[10px]" id="loadingtext"></p>
        </div>
    </div>

    <div class="w-full max-w-md animate-in fade-in zoom-in duration-500">
        <div class="text-center mb-6">
            <div class="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-indigo-200">
                <i data-lucide="factory" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-900">Nexus Prod</h1>
            <p class="text-slate-500 font-medium">Production Order Management Portal</p>
            <p class="text-center mt-2 text-slate-400 text-sm">Part of <strong>Trader SM</strong> Windows Ecosystem</p>
        </div>

        <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl shadow-slate-200">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Username</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="text" id="username" required
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl transition-all outline-none text-slate-700 font-semibold"
                            placeholder="Enter username">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="password" id="password" required
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl transition-all outline-none text-slate-700 font-semibold"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="space-y-3">
                    <button type="submit" 
                        class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        Sign In <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>

                    <button type="button" onclick="openConfig()"
                        class="w-full py-3 flex items-center justify-center gap-2 text-slate-400 hover:text-indigo-600 font-semibold text-sm transition-colors">
                        <i data-lucide="settings-2" class="w-4 h-4"></i>
                        Database Configuration
                    </button>
                </div>
            </form>
        </div>
        
        
        <p class="text-center mt-8 text-slate-400 text-sm">
            Developed and Managed by <br><strong>CYPHERON TECHNOLOGIES PVT. LTD</strong>
        </p>
    </div>

    <div id="configModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeConfig()"></div>
        <div class="relative bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-8 animate-in fade-in zoom-in duration-200">
            <div class="flex items-center gap-4 mb-6">
                <div class="bg-indigo-50 p-3 rounded-xl text-indigo-600"><i data-lucide="database"></i></div>
                <h3 class="text-xl font-bold text-slate-800">MySQL Connection</h3>
            </div>

            <div class="grid grid-cols-4 gap-4 mb-4">
                <div class="col-span-3">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Host</label>
                    <input type="text" id="db_host" class="w-full p-3 bg-slate-50 rounded-xl border-2 border-transparent focus:border-indigo-500 outline-none font-semibold text-sm" placeholder="localhost">
                </div>
                <div class="col-span-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Port</label>
                    <input type="number" id="db_port" class="w-full p-3 bg-slate-50 rounded-xl border-2 border-transparent focus:border-indigo-500 outline-none font-semibold text-sm" placeholder="3306">
                </div>
            </div>

            <div class="space-y-4 mb-8">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Database Name</label>
                    <input type="text" id="db_name" class="w-full p-3 bg-slate-50 rounded-xl border-2 border-transparent focus:border-indigo-500 outline-none font-semibold text-sm" placeholder="sample_db">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Username</label>
                    <input type="text" id="db_user" class="w-full p-3 bg-slate-50 rounded-xl border-2 border-transparent focus:border-indigo-500 outline-none font-semibold text-sm" placeholder="db_user">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Password</label>
                    <input type="password" id="db_pass" class="w-full p-3 bg-slate-50 rounded-xl border-2 border-transparent focus:border-indigo-500 outline-none font-semibold text-sm" placeholder="••••••••">
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <div class="flex gap-3">
                    <button onclick="testConnection()" class="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors">Test</button>
                    <button onclick="saveConfig()" class="flex-[2] py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-100 active:scale-95 transition-all">Save Config</button>
                </div>
                <button onclick="closeConfig()" class="w-full py-2 text-slate-400 font-semibold text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        lucide.createIcons();

        const notify = (msg, color = "#4f46e5") => {
            Toastify({ text: msg, gravity: "bottom", position: "center", style: { background: color, borderRadius: "12px", fontWeight: "600" } }).showToast();
        };

        function showBusy(show = true, text = null, timeout = true) {
            const overlay = document.getElementById('loading-overlay');
            const message = document.getElementById('loadingtext');
            if (show) {
                overlay.classList.remove('hidden');
                message.innerText = text ?? "Loading.."
                if(timeout)
                    setTimeout(() => overlay.classList.add('hidden'), 2000);
            }
            else {
                const overlay = document.getElementById('loading-overlay');
                message.innerText = text ?? "Loading.."
                overlay.classList.add('hidden');
            }
        }

        // Modal Logic
        function openConfig() {
            // Load existing data if available
            const config = JSON.parse(localStorage.getItem('db_config') || '{}');
            document.getElementById('db_host').value = config.host || '';
            document.getElementById('db_port').value = config.port || '3306';
            document.getElementById('db_name').value = config.database || '';
            document.getElementById('db_user').value = config.user || '';
            document.getElementById('db_pass').value = config.password || '';
            
            document.getElementById('configModal').classList.remove('hidden');
        }

        function closeConfig() {
            document.getElementById('configModal').classList.add('hidden');
        }

        function saveConfig() {
            const config = {
                host: document.getElementById('db_host').value,
                port: document.getElementById('db_port').value,
                database: document.getElementById('db_name').value,
                user: document.getElementById('db_user').value,
                password: document.getElementById('db_pass').value
            };

            if(!config.host || !config.database) {
                notify("Host and Database are required!", "#ef4444");
                return;
            }

            localStorage.setItem('db_config', JSON.stringify(config));
            notify("Configuration Saved Successfully", "#10b981");
            closeConfig();
        }

        function testConnection() {
            const config = {
                host: document.getElementById('db_host').value,
                port: document.getElementById('db_port').value,
                database: document.getElementById('db_name').value,
                user: document.getElementById('db_user').value,
                password: document.getElementById('db_pass').value
            };
            if (!config) {
                notify('Error: Database not configured. Please Fill Database Configuration.', '#ef4444');
                return;
            }
            notify("Testing connection... ", "#6366f1");
            setTimeout(() => notify("Connection Successful!", "#10b981"), 1500);
        }

        // Login Logic
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // CHECK CONFIGURATION FIRST
            const config = localStorage.getItem('db_config');
            if (!config) {
                notify('Error: Database not configured. Please click Database Configuration.', '#ef4444');

                return;
            }

            showBusy(true, 'Athenticating...', false);

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            setTimeout(()=>{
                if (user === "admin" && pass === "1234") {
                localStorage.setItem('nexus_authenticated', 'true');
                localStorage.setItem('nexus_user', user);
                notify('Login Successful!', '#10b981');
                
                setTimeout(() => {
                    showBusy(false);
                    window.location.href = 'index.html'
                }, 1000);
            } else {
                showBusy(false);
                notify('Invalid credentials.', '#ef4444');
            }
            },1000);
        });
    </script>
</body>
</html>
