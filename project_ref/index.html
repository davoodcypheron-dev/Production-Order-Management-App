<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus POS | Production Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; overscroll-behavior-y: contain; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .touch-active:active { transform: scale(0.98); background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

<body class="text-slate-900" onload="doOnLoad()">

    <div id="loading-overlay" class="hidden fixed inset-0 z-[250] flex items-center justify-center pointer-events-none">
        <div class="absolute inset-0 bg-slate-900/10 backdrop-blur-[2px]"></div>
        <div class="relative bg-white p-8 rounded-[2.5rem] shadow-2xl flex flex-col items-center justify-center border border-slate-100 animate-in fade-in zoom-in duration-200 pointer-events-auto">
            <div class="w-8 h-8 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
            <p class="mt-4 font-black text-slate-700 uppercase tracking-widest text-[10px]" id="loadingtext">Loading..</p>
        </div>
    </div>

    <nav class="glass-header sticky top-0 z-40 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl shadow-lg">
                <i data-lucide="factory" class="text-white w-5 h-5"></i>
            </div>
            <div>
                <h1 class="font-bold text-base leading-tight">Nexus Prod</h1>
                <p id="nav-section" class="text-[9px] text-indigo-600 font-bold uppercase tracking-widest">Active Section</p>
            </div>
        </div>
        <button onclick="logout()" class="p-2 bg-white border rounded-full text-slate-400 hover:text-red-500 transition-colors">
            <i data-lucide="log-out" class="w-4 h-4"></i>
        </button>
    </nav>

    <main class="max-w-4xl mx-auto p-4 lg:p-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
            <button onclick="openPicker('section')" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between touch-active">
                <div class="flex items-center gap-3">
                    <div class="text-purple-600"><i data-lucide="layers" class="w-5 h-5"></i></div>
                    <div class="text-left">
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Step 1</p>
                        <p id="label-section" class="font-bold text-slate-700 leading-tight">Select Section</p>
                    </div>
                </div>
                <i data-lucide="chevron-down" class="text-slate-300 w-4 h-4"></i>
            </button>

            <button id="btn-trip" onclick="openPicker('trip')" disabled class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between opacity-50 transition-all touch-active">
                <div class="flex items-center gap-3">
                    <div class="text-emerald-600"><i data-lucide="truck" class="w-5 h-5"></i></div>
                    <div class="text-left">
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Step 2</p>
                        <p id="label-trip" class="font-bold text-slate-700 leading-tight">Select Trip</p>
                    </div>
                </div>
                <i data-lucide="chevron-down" class="text-slate-300 w-4 h-4"></i>
            </button>
        </div>

        <div id="itemContainer" class="hidden space-y-3">
            <div class="flex justify-between items-center px-2">
                <h2 class="font-black text-slate-800 tracking-tight" id="list-title">Orders</h2>
                <div id="trip-badge" class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest"></div>
            </div>
            <div id="itemsBody" class="space-y-2 pb-24"></div>
        </div>

        <div id="emptyState" class="bg-white rounded-[2rem] p-12 text-center border-2 border-dashed border-slate-200 mt-10">
            <i data-lucide="package-search" class="text-slate-200 w-12 h-12 mx-auto mb-4"></i>
            <h3 class="text-lg font-bold text-slate-700">Awaiting Input</h3>
            <p class="text-slate-400 text-sm max-w-xs mx-auto">Please select both a production section and a delivery trip to generate your load list.</p>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 z-[100] hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closeDetail()"></div>
        <div class="relative bg-white w-full max-w-2xl rounded-t-[2.5rem] sm:rounded-3xl shadow-2xl h-[92vh] sm:h-auto sm:max-h-[85vh] flex flex-col overflow-hidden animate-in slide-in-from-bottom duration-300">
            
            <div class="p-5 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <div>
                    <p id="detUnit" class="text-[10px] font-black bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded uppercase tracking-tighter mb-1 inline-block">UNIT</p>
                    <h3 id="detName" class="text-xl font-black text-slate-800 leading-none tracking-tight">Item Name</h3>
                </div>
                <button onclick="closeDetail()" class="p-2 bg-slate-50 rounded-full text-slate-400 active:scale-90 transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <div id="detList" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar bg-slate-50">
                </div>

            <div class="p-6 bg-white border-t sticky bottom-0">
                <div class="flex justify-between items-center mb-4">
                    <p class="font-bold text-slate-400 uppercase text-[10px]">Consolidated Qty</p>
                    <p id="detGrandTotal" class="text-3xl font-black text-indigo-600">0</p>
                </div>
                <button onclick="saveItemUpdates()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl active:scale-95 transition-all text-lg flex items-center justify-center gap-3">
                    <i data-lucide="check-circle" class="w-5 h-5"></i> Update Invoice
                </button>
            </div>
        </div>
    </div>

    <div id="pickerModal" class="fixed inset-0 z-[100] hidden flex items-end justify-center">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closePicker()"></div>
        <div class="relative bg-white w-full rounded-t-[2.5rem] p-8 animate-in slide-in-from-bottom duration-300 shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h3 id="picker-title" class="text-xl font-bold mb-6 text-slate-800">Select Option</h3>
            <div id="pickerList" class="space-y-2 overflow-y-auto max-h-[50vh] custom-scrollbar"></div>
        </div>
    </div>

    <div id="confirmActionModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-sm rounded-[2rem] shadow-2xl p-8 text-center animate-in zoom-in duration-150">
            <div id="confirm-icon-bg" class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 bg-indigo-50 text-indigo-600">
                <i data-lucide="clipboard-check" class="w-10 h-10"></i>
            </div>
            <h3 id="confirm-title" class="text-xl font-black text-slate-800 mb-2">Generate?</h3>
            <p id="confirm-text" class="text-slate-500 text-sm mb-8">Detecting pending orders for today.</p>
            <div class="flex gap-3">
                <button id="confirm-no-btn" onclick="closeConfirmAction()" class="flex-1 py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl">Cancel</button>
                <button id="confirm-yes-btn" class="flex-1 py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">Process</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        lucide.createIcons();
        if (localStorage.getItem('nexus_authenticated') !== 'true') { window.location.href = 'login.html'; }

        const orderData = {
            "Fresh Bakery": [
                { id: 101, name: "Artisan Sourdough", unit: "Loaf", distribution: [
                    { branch: "Main Warehouse", trip: "06:00 AM Trip", qty: 45 },
                    { branch: "North Side Hub", trip: "06:00 AM Trip", qty: 30 },
                    { branch: "South Terminal", trip: "09:00 AM Trip", qty: 25 },
                    { branch: "Downtown Store", trip: "12:00 PM Trip", qty: 10 }
                ]},
                { id: 102, name: "Butter Croissant", unit: "Pack", distribution: [
                    { branch: "West End Plaza", trip: "09:00 AM Trip", qty: 40 },
                    { branch: "Skyline Mall", trip: "09:00 AM Trip", qty: 12 },
                    { branch: "Main Warehouse", trip: "06:00 AM Trip", qty: 45 }
                ]}
            ],
            "Beverages": [
                { id: 401, name: "Cold Brew Coffee", unit: "Btl", distribution: [
                    { branch: "Campus Point", trip: "09:00 AM Trip", qty: 80 },
                    { branch: "Downtown Store", trip: "09:00 AM Trip", qty: 60 }
                ]}
            ]
        };

        let currentSection = null;
        let currentTrip = null;
        let activeItem = null;
        // KEY CHANGE: Track using "itemId-tripName"
        let completedItems = new Set();

        function showBusy(show = true, text = null, timeout = true) {
            const overlay = document.getElementById('loading-overlay');
            const message = document.getElementById('loadingtext');
            if (show) {
                overlay.classList.remove('hidden');
                message.innerText = text ?? "Syncing..";
                if (timeout) setTimeout(() => overlay.classList.add('hidden'), 2000);
            } else { overlay.classList.add('hidden'); }
        }

        const notify = (m, c) => Toastify({ text: m, gravity: "bottom", position: "center", style: { background: c, borderRadius: "12px", fontWeight: "700" } }).showToast();

        function doOnLoad() {
            const modal = document.getElementById('confirmActionModal');
            document.getElementById('confirm-title').innerText = 'Pending Orders';
            document.getElementById('confirm-text').innerText = 'New branch orders detected for today. Generate invoices?';
            document.getElementById('confirm-no-btn').innerText = 'Later';
            document.getElementById('confirm-yes-btn').innerText = 'Generate';
            modal.classList.remove('hidden');
            document.getElementById('confirm-yes-btn').onclick = () => { modal.classList.add('hidden'); showBusy(true, 'Generating Invoices...'); };
        }

        function closeConfirmAction() { document.getElementById('confirmActionModal').classList.add('hidden'); }

        function openPicker(type) {
            const list = document.getElementById('pickerList');
            const title = document.getElementById('picker-title');
            list.innerHTML = '';
            
            if (type === 'section') {
                title.innerText = "Select Production Section";
                Object.keys(orderData).forEach(sec => createPickerButton(list, sec, currentSection === sec, () => handleSectionSelect(sec)));
            } else if (type === 'trip') {
                title.innerText = "Select delivery Trip";
                const trips = getAvailableTrips();
                trips.forEach(trip => createPickerButton(list, trip, currentTrip === trip, () => handleTripSelect(trip)));
            }
            document.getElementById('pickerModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function createPickerButton(parent, label, isActive, onClick) {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-5 rounded-xl border border-slate-100 hover:bg-indigo-50 font-bold flex justify-between items-center mb-1 transition-all";
            btn.innerHTML = `<span class="${isActive ? 'text-indigo-600' : ''}">${label}</span><i data-lucide="check-circle" class="w-5 h-5 text-indigo-600 ${isActive ? '' : 'hidden'}"></i>`;
            btn.onclick = onClick;
            parent.appendChild(btn);
        }

        function handleSectionSelect(sec) {
            currentSection = sec;
            currentTrip = null;
            document.getElementById('label-section').innerText = sec;
            document.getElementById('nav-section').innerText = sec;
            document.getElementById('label-trip').innerText = "Select Trip";
            document.getElementById('btn-trip').disabled = false;
            document.getElementById('btn-trip').classList.remove('opacity-50');
            loadOrders(true);
            closePicker();
            
           // setTimeout(() => openPicker('trip'), 300); // Auto-open trip picker
        }

        function handleTripSelect(trip) {
            currentTrip = trip;
            document.getElementById('label-trip').innerText = trip;
            closePicker();
            loadOrders();
        }

        function getAvailableTrips() {
            if (!currentSection) return [];
            const trips = new Set();
            orderData[currentSection].forEach(item => { item.distribution.forEach(d => trips.add(d.trip)); });
            return Array.from(trips).sort();
        }

        function closePicker() { document.getElementById('pickerModal').classList.add('hidden'); }

        function loadOrders(empty = false) {
            if(empty){
                document.getElementById('itemContainer').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }
            showBusy(true, 'Loading Order List...', false);
            setTimeout(() => { renderList(); showBusy(false); }, 600);
        }

        function renderList() {
            const body = document.getElementById('itemsBody');
            body.innerHTML = '';
            const allItems = orderData[currentSection] || [];
            const items = allItems.filter(item => item.distribution.some(d => d.trip === currentTrip));

            if (items.length > 0) {
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('itemContainer').classList.remove('hidden');
                document.getElementById('trip-badge').innerText = currentTrip;
            } else {
                document.getElementById('emptyState').classList.remove('hidden');
                
            }

            // SORTING: Check completion using ItemID + CurrentTrip
            const sortedItems = [...items].sort((a, b) => {
                const aDone = completedItems.has(a.id + '-' + currentTrip);
                const bDone = completedItems.has(b.id + '-' + currentTrip);
                return aDone - bDone;
            });

            sortedItems.forEach(item => {
                const doneKey = item.id + '-' + currentTrip;
                const isDone = completedItems.has(doneKey);
                const tripTotal = item.distribution.filter(d => d.trip === currentTrip).reduce((s, c) => s + c.qty, 0);

                const div = document.createElement('div');
                div.className = `p-4 rounded-xl border transition-all duration-300 flex items-center justify-between cursor-pointer touch-active ${isDone ? "bg-emerald-50 border-emerald-100 opacity-80" : "bg-white border-slate-100 shadow-sm"}`;
                div.onclick = () => openDetail(item);
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 ${isDone ? 'bg-emerald-500 text-white' : 'bg-slate-50 text-slate-400'} rounded-lg flex items-center justify-center font-bold text-[9px] uppercase">
                            ${isDone ? '<i data-lucide="check" class="w-5 h-5"></i>' : item.unit}
                        </div>
                        <div>
                            <h4 class="font-bold ${isDone ? 'text-emerald-900' : 'text-slate-800'}">${item.name}</h4>
                            <p class="text-[9px] font-bold uppercase tracking-widest ${isDone ? 'text-emerald-600' : 'text-slate-400'}">
                                ${isDone ? 'Trip Ready' : 'Pending Load'}
                            </p>
                        </div>
                    </div>
                    <div class="text-xl font-black ${isDone ? 'text-emerald-600' : 'text-indigo-600'}">${tripTotal}</div>
                `;
                body.appendChild(div);
            });
            lucide.createIcons();
        }

        function openDetail(item) {
            activeItem = JSON.parse(JSON.stringify(item));
            document.getElementById('detName').innerText = activeItem.name;
            document.getElementById('detUnit').innerText = activeItem.unit;
            renderBranchList();
            document.getElementById('detailModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function renderBranchList() {
            const list = document.getElementById('detList');
            list.innerHTML = '';
            const filteredDist = activeItem.distribution.filter(d => d.trip === currentTrip);
            let total = 0;

            filteredDist.forEach((dist) => {
                total += dist.qty;
                const idx = activeItem.distribution.findIndex(d => d.branch === dist.branch && d.trip === currentTrip);
                const row = document.createElement('div');
                row.className = "bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm";
                row.innerHTML = `
                    <span class="text-xs font-bold text-slate-500 uppercase flex-1 pr-2">${dist.branch}</span>
                    <div class="flex items-center gap-2 bg-slate-50 p-1 rounded-xl border">
                        <button onclick="updateQty(${idx}, -1)" class="w-10 h-10 rounded-lg bg-white shadow-sm flex items-center justify-center text-slate-600 font-bold active:bg-slate-100 transition-all">-</button>
                        <span class="w-8 text-center font-black text-slate-800 text-lg">${dist.qty}</span>
                        <button onclick="updateQty(${idx}, 1)" class="w-10 h-10 rounded-lg bg-white shadow-sm flex items-center justify-center text-indigo-600 font-bold active:bg-slate-100 transition-all">+</button>
                    </div>
                `;
                list.appendChild(row);
            });
            document.getElementById('detGrandTotal').innerText = total;
        }

        function updateQty(index, delta) {
            activeItem.distribution[index].qty = Math.max(0, activeItem.distribution[index].qty + delta);
            renderBranchList();
        }

        function saveItemUpdates() {
            const originalItem = orderData[currentSection].find(i => i.id === activeItem.id);
            originalItem.distribution = activeItem.distribution;
            showBusy(true, 'Updating Trip Invoice...', false);
            setTimeout(() => {
                // MARK AS COMPLETED FOR THIS SPECIFIC TRIP
                completedItems.add(activeItem.id + '-' + currentTrip);
                showBusy(false);
                notify("Invoices updated for " + currentTrip, "#10b981");
                closeDetail();
                renderList();
            }, 600);
        }

        function closeDetail() { document.getElementById('detailModal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('nexus_authenticated'); window.location.href = 'login.html'; }
    </script>
</body>
</html>
